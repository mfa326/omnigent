# Publish fork images to GHCR under the mfa326 namespace.
#
# This is a stripped-down version of oss-publish-images.yml that builds and
# pushes the server and host images from the fork's main branch to
# ghcr.io/mfa326/omnigent-server and ghcr.io/mfa326/omnigent-host.
#
# Tags:
#   :sha-<short>  immutable per-commit pin
#   :latest-dev   floating tag that tracks the latest main build
#
# The upstream workflow is gated to github.repository == 'omnigent-ai/omnigent',
# so it always skips in this fork. This workflow replaces it.
name: Publish fork images

on:
  push:
    branches: [main]
    paths:
      - 'deploy/docker/Dockerfile'
      - 'deploy/docker/entrypoint.py'
      - 'omnigent/**'
      - 'web/**'
      - 'sdks/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'uv.lock'
      - '.github/workflows/fork-publish-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-publish-images-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          SERVER_IMAGE="ghcr.io/mfa326/omnigent-server"
          HOST_IMAGE="ghcr.io/mfa326/omnigent-host"
          echo "server_tags=${SERVER_IMAGE}:sha-${SHORT_SHA},${SERVER_IMAGE}:latest-dev" >> "$GITHUB_OUTPUT"
          echo "host_tags=${HOST_IMAGE}:sha-${SHORT_SHA},${HOST_IMAGE}:latest-dev" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.server_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          target: host
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.host_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
